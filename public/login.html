<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión – Lotería Mexicana</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

  <div class="auth-box">
    <div class="auth-logo">
      <span class="logo-emoji">🎴</span>
      <h1>Lotería Mexicana</h1>
      <p>Inicia sesión para jugar</p>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" class="input" placeholder="correo@ejemplo.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" class="input" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-lg">Entrar al juego</button>
    </form>

    <p class="auth-link">
      ¿No tienes cuenta? <a href="/register.html">Regístrate aquí</a>
    </p>
  </div>

  <div id="toast"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
