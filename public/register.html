<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro – Lotería Mexicana</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

  <div class="auth-box">
    <div class="auth-logo">
      <span class="logo-emoji">🎴</span>
      <h1>Lotería Mexicana</h1>
      <p>Crea tu cuenta para jugar</p>
    </div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label for="username">Nombre de usuario</label>
        <input type="text" id="username" name="username" class="input"
               placeholder="mi_nombre" minlength="3" maxlength="50" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" class="input"
               placeholder="correo@ejemplo.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" class="input"
               placeholder="Mínimo 6 caracteres" minlength="6" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="confirm">Confirmar contraseña</label>
        <input type="password" id="confirm" name="confirm" class="input"
               placeholder="Repite la contraseña" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-lg">Crear cuenta</button>
    </form>

    <p class="auth-link">
      ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a>
    </p>
  </div>

  <div id="toast"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
